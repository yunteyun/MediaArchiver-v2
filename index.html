<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' media: data:; media-src 'self' media:; connect-src 'self';">
  <title>MediaArchiver v2</title>
  <style>
    html,
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(30, 41, 59, 0.92), rgba(15, 23, 42, 1) 58%),
        #0f172a;
      color: #e2e8f0;
    }

    body {
      overflow: hidden;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    #root {
      width: 100%;
      height: 100vh;
    }

    #boot-splash {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(30, 41, 59, 0.92), rgba(15, 23, 42, 1) 58%),
        #0f172a;
      transition: opacity 160ms ease;
      z-index: 1;
    }

    #boot-splash[hidden] {
      opacity: 0;
      pointer-events: none;
    }

    .boot-splash__panel {
      display: grid;
      gap: 10px;
      justify-items: center;
      padding: 24px 28px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.58);
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.35);
      backdrop-filter: blur(8px);
    }

    .boot-splash__title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .boot-splash__subtitle {
      font-size: 12px;
      color: rgba(226, 232, 240, 0.74);
    }
  </style>
</head>

<body>
  <div id="boot-splash" aria-hidden="true">
    <div class="boot-splash__panel">
      <div class="boot-splash__title">MediaArchiver v2</div>
      <div class="boot-splash__subtitle">起動中...</div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
